name: Latest Build

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Latest Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ''
          - goos: linux
            goarch: arm64
            ext: ''
          - goos: darwin
            goarch: amd64
            ext: ''
          - goos: darwin
            goarch: arm64
            ext: ''
          - goos: windows
            goarch: amd64
            ext: '.exe'
          - goos: windows
            goarch: arm64
            ext: '.exe'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Get short commit SHA
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          cd go-validator
          go build \
            -ldflags "-s -w -X main.Version=latest-${{ env.SHORT_SHA }}" \
            -trimpath \
            -o gopro-validator-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gopro-validator-${{ matrix.goos }}-${{ matrix.goarch }}
          path: go-validator/gopro-validator-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  release:
    name: Update Latest Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd binaries
          sha256sum gopro-validator-* > checksums.txt
          cat checksums.txt

      - name: Get current date
        run: echo "BUILD_DATE=$(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_ENV

      - name: Delete existing latest release
        run: |
          gh release delete latest --yes || true
          git push origin :refs/tags/latest || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Development Build"
          prerelease: true
          files: binaries/*
          body: |
            Latest development build from commit ${{ github.sha }}

            **Built:** ${{ env.BUILD_DATE }}
            **Commit:** ${{ github.event.head_commit.message }}

            This is an automated build from the main branch. For stable releases, see the [Releases page](https://github.com/${{ github.repository }}/releases).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
