name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-build:
    name: Lint and Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ['1.21']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Check formatting
        working-directory: ./go-validator
        run: |
          if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then
            echo "The following files are not formatted:"
            gofmt -l .
            exit 1
          fi
        shell: bash

      - name: Run go vet
        working-directory: ./go-validator
        run: go vet ./...

      - name: Build
        working-directory: ./go-validator
        run: go build -v -o gopro-validator

      - name: Verify binary exists
        working-directory: ./go-validator
        run: |
          if [ -f gopro-validator ] || [ -f gopro-validator.exe ]; then
            echo "Build successful"
          else
            echo "Binary not found"
            exit 1
          fi
        shell: bash
